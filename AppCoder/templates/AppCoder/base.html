<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{% endblock %} - CodinApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f4f4; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            margin: 0;
        }
        .navbar { background-color: #2c3e50; }
        .main-container { 
            margin-top: 50px; 
            margin-bottom: 50px;
            flex: 1; /* Esto empuja el footer al fondo */
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'Inicio' %}">CODINAPP</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'Cursos' %}" title="Ver listado">Cursos</a>
            <a class="nav-link" href="{% url 'Profesores' %}">Profesores</a>
            <a class="nav-link" href="{% url 'Estudiantes' %}">Estudiantes</a>
            <a class="nav-link" href="{% url 'CursoFormulario' %}">Cargar Curso</a>
            <a class="nav-link" href="{% url 'BusquedaCamada' %}">Buscador</a>
        </div>
    </div>
</nav>

    <div class="container main-container">
        <div class="bg-white p-5 shadow rounded">
            {% block contenido %}
            {% endblock %}
        </div>
    </div> 
    <footer class="bg-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-1">&copy; 2026 Mi Proyecto Coder - Todos los derechos reservados</p>
            <p class="small">Contacto: <a href="mailto:miltonpascualon543@gmail.com" class="text-info text-decoration-none">miltonpascualon543@gmail.com</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
